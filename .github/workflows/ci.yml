name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Gateway lint + test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: gateway/pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Black (check only)
        run: black --check src tests
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest --cov=agent_gateway --cov-report=term-missing

  shellcheck:
    name: ShellCheck installer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint install.sh and lib/*.sh
        run: |
          shellcheck install.sh
          shellcheck installer/lib/*.sh
